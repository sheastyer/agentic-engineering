# ─────────────────────────────────────────────────────────────────────────────
# Agentic org — Coolify deployment stack (the CLAUDE.md §5 "self-hosted
# docker-compose + Postgres" target). Everything the org needs to accept real
# feedback and run it through the full flow, without a laptop in the loop:
#
#   postgres         Temporal's persistence (named volume)
#   temporal         Temporal server (auto-setup; gRPC 7233, published on the
#                    host so cli.run / cli.trace can drive it from the LAN)
#   ui               Temporal Web UI — watch every workflow/stage live
#   worker           the org: all reasoning personas live (Vercel gateway),
#                    real coding pod (Claude subscription), Slack gates
#   slack-listener   Socket Mode: approve/reject button clicks → gate signals
#   intake           POST /feedback → starts the right workflow (the "endpoint"
#                    intake adapter; a Kafka consumer would later feed the same
#                    route(), so this service is that seam)
#
# ── Coolify setup (see docs/COOLIFY.md for the full runbook) ─────────────────
# 1. New Resource → GitHub App source → this repo → Docker Compose build pack →
#    compose file `docker-compose.coolify.yml`.
# 2. Set the env vars listed in docs/COOLIFY.md (secrets marked as such):
#    AI_GATEWAY_API_KEY, CLAUDE_CODE_OAUTH_TOKEN (`claude setup-token`), GH_TOKEN,
#    SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_CHANNEL_ID, SLACK_APPROVER_IDS,
#    INTAKE_TOKEN. SERVICE_PASSWORD_POSTGRES is generated by Coolify.
# 3. Set public domains on `ui` (8080) and `intake` (8000). ⚠ The Temporal UI
#    has NO auth of its own — keep its domain behind Cloudflare Access or
#    LAN-only DNS. The intake endpoint requires its bearer token but carries no
#    rate limiting; front it with Access too unless it must be public.
# 4. The worker drives the HOST's Docker through the mounted socket (the D9
#    container sandbox + the preview stack). Workspaces therefore live on a
#    host bind mount at an IDENTICAL path in-container (/var/lib/agentic-org/work,
#    TMPDIR below) so `docker run -v <workspace>:/work` resolves on the host.
#
# Ops notes:
#  • Worker/listener/intake fail fast when a required credential is missing and
#    restart until Temporal is reachable — a brief crash-loop right after deploy
#    is normal while auto-setup initializes the database.
#  • Known gap: post-QA screenshots (advisory) — the preview stack publishes its
#    port on the HOST, and profiles point at localhost, which inside the worker
#    container is not the host; capture degrades to captured=False by design.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ---- Temporal persistence -------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: temporal
    volumes:
      - temporal-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Temporal server (auto-setup creates schemas + the default namespace) --
  temporal:
    image: temporalio/auto-setup:1.29.7
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${SERVICE_PASSWORD_POSTGRES}
      # Closed workflows stay visible in the UI this long (the audit trail's
      # cli.trace reads history too — don't let runs vanish after the 24h default).
      - DEFAULT_NAMESPACE_RETENTION=720h
    ports:
      # gRPC on the host: lets cli.run / cli.trace / evals on the LAN target the
      # deployed org (TEMPORAL_TARGET=<server>:7233). Remove if the Coolify host
      # is reachable from untrusted networks — there is no auth on this port.
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---- Temporal Web UI — follow the flows -----------------------------------
  ui:
    image: temporalio/ui:2.52.0
    environment:
      # Coolify parses SERVICE_FQDN_<NAME>_<PORT>: set the actual domain in the UI.
      - SERVICE_FQDN_UI_8080
      - TEMPORAL_ADDRESS=temporal:7233
    expose:
      - "8080"
    depends_on:
      - temporal
    restart: unless-stopped

  # ---- The org's worker: both planes live + Slack gates ----------------------
  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
    environment:
      - TEMPORAL_TARGET=temporal:7233
      # Reasoning plane — Vercel AI Gateway (fail-fast without the key).
      - ORG_LIVE=1
      - AI_GATEWAY_API_KEY
      # Coding plane — Agent SDK on the Claude subscription (`claude setup-token`).
      # ⚠ `claude` runs the agent process IN THIS container (only the test command is
      # sandboxed) — see docs/COOLIFY.md "Security model" before exposing the intake;
      # `claude_container` + CODING_AGENT_IMAGE is the hardened (single-session) option.
      - USE_AGENT_CODING=1
      - CODING_AGENT=${CODING_AGENT:-claude}
      - CODING_SANDBOX=container
      - CODING_PR_TARGET=${CODING_PR_TARGET:-github}
      - CODING_PERMISSION_MODE=bypassPermissions
      - CLAUDE_CODE_OAUTH_TOKEN
      # PR/CI/merge plumbing (gh + git https pushes; ssh remotes are rewritten
      # to token'd https by the entrypoint).
      - GH_TOKEN
      # Human I/O — Slack gates + per-run progress thread.
      - ORG_SLACK=1
      - SLACK_BOT_TOKEN
      - SLACK_CHANNEL_ID
      - SLACK_APPROVER_IDS
      # Workspaces must be created on the shared host path (see header note 4).
      - TMPDIR=/var/lib/agentic-org/work
      # Optional knobs — set in Coolify only when needed (bare = pass-through):
      - CODING_SANDBOX_IMAGE
      - CODING_AGENT_IMAGE
      - MEALPLANNER_GITHUB_TOKEN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/agentic-org/work:/var/lib/agentic-org/work
    depends_on:
      - temporal
    restart: unless-stopped

  # ---- Slack Socket Mode listener: button click → Temporal signal ------------
  slack-listener:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: ["python", "-m", "orchestrator.humanio"]
    environment:
      - TEMPORAL_TARGET=temporal:7233
      - SLACK_BOT_TOKEN
      - SLACK_APP_TOKEN
      - SLACK_APPROVER_IDS
    depends_on:
      - temporal
    restart: unless-stopped

  # ---- HTTP intake: POST /feedback (bearer INTAKE_TOKEN) → workflow ----------
  intake:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: ["python", "-m", "orchestrator.intake_http"]
    environment:
      - SERVICE_FQDN_INTAKE_8000
      - TEMPORAL_TARGET=temporal:7233
      - INTAKE_TOKEN
    expose:
      - "8000"
    depends_on:
      - temporal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  temporal-db:
